<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog Posts | Editorial</title>
    <!-- Premium Typography -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:wght@700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #fdfdfd;
            --text-main: #1a1a1a;
            --text-muted: #666666;
            --accent-color: #0056b3;
            --border-color: #eeeeee;
            --card-bg: #ffffff;
            --font-serif: 'Playfair Display', serif;
            --font-sans: 'Inter', sans-serif;
            --max-width: 800px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font-sans);
            background-color: var(--bg-color);
            color: var(--text-main);
            line-height: 1.6;
            padding: 60px 20px;
        }

        .container {
            max-width: var(--max-width);
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 80px;
        }

        h1 {
            font-family: var(--font-serif);
            font-size: 3.5rem;
            font-weight: 800;
            letter-spacing: -0.02em;
            margin-bottom: 10px;
            color: var(--text-main);
        }

        .subtitle {
            font-size: 1.1rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.1em;
            font-weight: 500;
        }

        .posts-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 60px;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .post-card {
            background: var(--card-bg);
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 40px;
            transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
            text-decoration: none;
            color: inherit;
            display: block;
            opacity: 0; /* Hidden initially for animation */
            animation: fadeInUp 0.8s ease forwards;
        }

        .post-card:hover {
            opacity: 0.9;
            transform: translateY(-4px);
        }

        .post-img-container {
            width: 100%;
            height: 450px;
            overflow: hidden;
            border-radius: 4px;
            margin-bottom: 25px;
            background-color: #f0f0f0;
        }

        .post-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.8s cubic-bezier(0.165, 0.84, 0.44, 1);
        }

        .post-card:hover .post-img {
            transform: scale(1.05);
        }

        .post-meta {
            font-size: 0.85rem;
            color: var(--accent-color);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 12px;
        }

        .post-title {
            font-family: var(--font-serif);
            font-size: 2.2rem;
            font-weight: 700;
            line-height: 1.2;
            color: var(--text-main);
            margin-bottom: 15px;
        }

        .post-excerpt {
            font-size: 1.1rem;
            color: var(--text-muted);
            margin-bottom: 20px;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .read-more {
            font-size: 0.95rem;
            font-weight: 600;
            color: var(--text-main);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .read-more::after {
            content: '→';
            transition: transform 0.3s ease;
        }

        .post-card:hover .read-more::after {
            transform: translateX(5px);
        }

        .loading {
            text-align: center;
            font-family: var(--font-serif);
            font-style: italic;
            font-size: 1.2rem;
            color: var(--text-muted);
            padding: 100px 0;
        }

        .error {
            background-color: #fff5f5;
            color: #c53030;
            padding: 20px;
            border-radius: 4px;
            border: 1px solid #feb2b2;
            text-align: center;
        }

        @media (max-width: 600px) {
            h1 { font-size: 2.5rem; }
            .post-title { font-size: 1.8rem; }
            .post-img-container { height: 300px; }
            body { padding: 40px 15px; }
        }
    </style>
</head>

<body>
    <div class="container">
        <header>
            <div class="subtitle">The Daily Journal</div>
            <h1>Editorial Postings</h1>
        </header>

        <main id="posts-container" class="posts-grid">
            <div class="loading">Fetching the latest stories...</div>
        </main>
    </div>

    <script>
        async function loadPosts() {
            try {
                const response = await fetch('https://jsonplaceholder.typicode.com/posts');
                let posts = await response.json();
                posts = posts.slice(0, 20);

                const container = document.getElementById('posts-container');
                container.innerHTML = '';

                posts.forEach((post, index) => {
                    const postLink = document.createElement('a');
                    postLink.className = 'post-card';
                    postLink.href = `post-detail.html?id=${post.id}`;
                    // Staggered animation delay (max 2s limit for very long lists)
                    const delay = Math.min(index * 0.1, 2);
                    postLink.style.animationDelay = `${delay}s`;
                    
                    const imageUrl = `https://picsum.photos/900/600?random=${post.id}`;
                    
                    postLink.innerHTML = `
                        <div class="post-img-container">
                            <img class="post-img" src="${imageUrl}" alt="${post.title}" loading="lazy">
                        </div>
                        <div class="post-meta">Story ID: ${post.id} • Author ${post.userId}</div>
                        <h2 class="post-title">${post.title}</h2>
                        <p class="post-excerpt">${post.body}</p>
                        <div class="read-more">Read Full Story</div>
                    `;
                    container.appendChild(postLink);
                });
            } catch (error) {
                document.getElementById('posts-container').innerHTML = `
                    <div class="error">
                        <strong>Unable to load stories.</strong><br>
                        ${error.message}
                    </div>
                `;
            }
        }

        loadPosts();
    </script>
</body>

</html>
